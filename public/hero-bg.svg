<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hero Background">
  <defs>
    <radialGradient id="heroGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#800E13"/>
      <stop offset="40%" stop-color="#640D14"/>
      <stop offset="70%" stop-color="#38040E"/>
