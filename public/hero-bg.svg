<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hero Background">
  <defs>
    <radialGradient id="heroGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#800E13"/>
      <stop offset="40%" stop-color="#640D14"/>
      <stop offset="70%" stop-color="#38040E"/>
      <stop offset="100%" stop-color="#250902"/>
    </radialGradient>
    <!-- Subtle secondary glow -->
    <radialGradient id="glowRight" cx="85%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#800E13" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#250902" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base dark background -->
  <rect width="1440" height="800" fill="#250902"/>
  <!-- Main radial gradient -->
  <rect width="1440" height="800" fill="url(#heroGrad)"/>
  <!-- Secondary glow top-right -->
  <rect width="1440" height="800" fill="url(#glowRight)"/>
  <!-- Subtle decorative crescent watermark bottom-right -->
  <g opacity="0.07" transform="translate(1100, 500) scale(2.5)">
    <path d="M 100 18 C 88 18, 8 42, 8 80 C 8 118, 88 142, 100 142 C 107 142, 118 118, 114 80 C 118 42, 107 18, 100 18 Z" fill="#FFFFFF"/>
    <path d="M 120 18 C 132 18, 212 42, 212 80 C 212 118, 132 142, 120 142 C 113 142, 102 118, 106 80 C 102 42, 113 18, 120 18 Z" fill="#FFFFFF"/>
  </g>
</svg>
