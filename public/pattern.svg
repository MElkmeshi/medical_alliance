<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 160 120" role="img" aria-label="Brand Pattern">
  <defs>
    <pattern id="logoPattern" x="0" y="0" width="80" height="60" patternUnits="userSpaceOnUse">
      <!-- Primary tile -->
      <image href="/stacked_crescent_dark.svg" x="4" y="6" width="34" height="29" opacity="0.8"/>
      <!-- Offset duplicate -->
      <image href="/stacked_crescent_dark.svg" x="44" y="31" width="34" height="29" opacity="0.8"/>
